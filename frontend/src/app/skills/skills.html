<div class="skills-container">
  <!-- Loading State -->
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="error-message">
    <mat-icon>error</mat-icon>
    <p>{{ error }}</p>
    <button mat-raised-button color="primary" (click)="loadSkills()">Retry</button>
  </div>

  <!-- Content -->
  <div *ngIf="!loading && !error" class="content">
    <div class="header" appScrollAnimation>
      <h1 class="page-title">
        <span class="gradient-text">Skills & Technologies</span>
      </h1>
      <p class="subtitle">My technical expertise across various domains</p>
      
      <!-- Stats Overview -->
      <div class="stats-overview">
        <div class="stat-card" *ngFor="let stat of stats">
          <div class="stat-icon">
            <mat-icon>{{ stat.icon }}</mat-icon>
          </div>
          <div class="stat-value">{{ stat.value }}</div>
          <div class="stat-label">{{ stat.label }}</div>
        </div>
      </div>
    </div>

    <!-- Skills Grid -->
    <div class="skills-grid" *ngIf="categories.length > 0">
      <mat-card *ngFor="let category of categories; let i = index" 
                class="category-card" 
                appScrollAnimation
                [style.animation-delay.ms]="i * 100">
        <div class="card-glow"></div>
        <mat-card-header>
          <div class="header-content">
            <div class="icon-wrapper">
              <mat-icon>{{ getCategoryIcon(category) }}</mat-icon>
            </div>
            <div class="title-wrapper">
              <mat-card-title>{{ category }}</mat-card-title>
              <span class="skill-count">{{ skillsByCategory[category].length }} skills</span>
            </div>
          </div>
        </mat-card-header>
        <mat-card-content>
          <div class="skills-progress-list">
            <app-skill-progress-bar
              *ngFor="let skill of skillsByCategory[category]"
              [skillName]="skill.name"
              [level]="getLevelPercentage(skill.level)"
              [animateOnView]="true">
            </app-skill-progress-bar>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <!-- No Skills Message -->
    <div *ngIf="categories.length === 0" class="no-data">
      <mat-icon>code_off</mat-icon>
      <p>No skills data available.</p>
    </div>
  </div>
</div>
