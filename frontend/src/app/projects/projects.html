<div class="projects-container">
  <!-- Loading State -->
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="error-message">
    <mat-icon>error</mat-icon>
    <p>{{ error }}</p>
    <button mat-raised-button color="primary" (click)="loadProjects()">Retry</button>
  </div>

  <!-- Content -->
  <div *ngIf="!loading && !error" class="content">
    <div class="header">
      <h1 class="page-title">Projects</h1>
      <p class="subtitle">Explore my portfolio of web and mobile applications</p>
    </div>

    <!-- Filter Section -->
    <div class="filter-section">
      <mat-button-toggle-group [(value)]="showFeaturedOnly" (change)="toggleFeatured()">
        <mat-button-toggle [value]="false">All Projects ({{ totalProjects }})</mat-button-toggle>
        <mat-button-toggle [value]="true">Featured Only</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid" *ngIf="projects.length > 0">
      <app-project-card 
        *ngFor="let project of projects" 
        [project]="project"
        (click)="viewProject(project)">
      </app-project-card>
    </div>

    <!-- No Projects Message -->
    <div *ngIf="projects.length === 0" class="no-data">
      <mat-icon>work_off</mat-icon>
      <p>No projects found.</p>
    </div>

    <!-- Pagination -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button 
        mat-icon-button 
        [disabled]="currentPage === 1"
        (click)="goToPage(currentPage - 1)">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <div class="page-numbers">
        <button 
          *ngFor="let page of [].constructor(totalPages); let i = index"
          mat-button
          [class.active]="currentPage === i + 1"
          (click)="goToPage(i + 1)">
          {{ i + 1 }}
        </button>
      </div>

      <button 
        mat-icon-button 
        [disabled]="currentPage === totalPages"
        (click)="goToPage(currentPage + 1)">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  </div>
</div>
